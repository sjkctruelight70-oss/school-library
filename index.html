<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园图书馆系统 (专业版)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .modal { transition: opacity 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden flex flex-col md:flex-row font-sans">

    <!-- 登录拦截罩 -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-11/12 max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800"><i class="fa-solid fa-school text-blue-600 mr-2"></i>图书馆系统登录</h2>
            <input type="password" id="admin-pwd" placeholder="请输入管理员密码 (admin123)" class="w-full border-2 border-gray-200 p-3 rounded-lg mb-4 focus:outline-none focus:border-blue-500 text-center text-lg" onkeypress="if(event.key==='Enter') window.loginApp()">
            <button onclick="window.loginApp()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-3 rounded-lg shadow-lg transition">登 录</button>
        </div>
    </div>

    <!-- 左侧导航 -->
    <nav id="main-nav" class="hidden bg-white shadow-xl z-10 w-full md:w-56 md:h-full flex-shrink-0 flex md:flex-col justify-around md:justify-start order-last md:order-first absolute md:relative bottom-0">
        <div class="hidden md:flex flex-col items-center justify-center py-6 border-b">
            <i class="fa-solid fa-book-reader text-4xl text-blue-600 mb-2"></i>
            <h1 class="text-lg font-bold text-gray-700">图书馆管理端</h1>
        </div>
        <a href="#" onclick="window.switchTab('borrow')" id="nav-borrow" class="nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-blue-600 bg-blue-50 md:border-l-4 border-blue-600">
            <i class="fa-solid fa-barcode text-xl md:mr-3 md:w-6 text-center"></i><span class="text-xs md:text-base mt-1 md:mt-0 font-bold">借还工作台</span>
        </a>
        <a href="#" onclick="window.switchTab('books')" id="nav-books" class="nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-gray-500 hover:bg-gray-50 md:border-l-4 border-transparent">
            <i class="fa-solid fa-book text-xl md:mr-3 md:w-6 text-center"></i><span class="text-xs md:text-base mt-1 md:mt-0 font-bold">书本管理</span>
        </a>
        <a href="#" onclick="window.switchTab('students')" id="nav-students" class="nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-gray-500 hover:bg-gray-50 md:border-l-4 border-transparent">
            <i class="fa-solid fa-users text-xl md:mr-3 md:w-6 text-center"></i><span class="text-xs md:text-base mt-1 md:mt-0 font-bold">师生管理</span>
        </a>
        <a href="#" onclick="window.switchTab('reading')" id="nav-reading" class="nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-gray-500 hover:bg-gray-50 md:border-l-4 border-transparent">
            <i class="fa-solid fa-pen-to-square text-xl md:mr-3 md:w-6 text-center"></i><span class="text-xs md:text-base mt-1 md:mt-0 font-bold">阅读量登记</span>
        </a>
    </nav>

    <!-- 主内容区 -->
    <main id="main-content" class="hidden flex-1 p-4 md:p-8 overflow-y-auto mb-16 md:mb-0 bg-gray-100">
        
        <!-- ================= 模块1：扫码借还 (支持红外扫码枪) ================= -->
        <section id="borrow" class="h-full flex flex-col max-w-5xl mx-auto">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center bg-gradient-to-r from-blue-50 to-white">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-1">借还书工作台</h2>
                    <p class="text-gray-500 text-sm">请使用红外扫码枪直接扫描，或在此手动输入编号回车</p>
                </div>
                <div class="flex mt-4 md:mt-0 bg-gray-200 p-1 rounded-lg">
                    <button onclick="window.setMode('borrow')" id="btn-mode-borrow" class="px-6 py-2 bg-blue-600 text-white rounded-md font-bold shadow">借书</button>
                    <button onclick="window.setMode('return')" id="btn-mode-return" class="px-6 py-2 text-gray-600 rounded-md font-bold hover:bg-gray-300">还书</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 扫码输入区 -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">1. 扫描/输入学生编号 (S开头)</label>
                        <input type="text" id="scan-student-input" class="w-full border-2 border-gray-300 p-3 rounded-lg focus:border-blue-500 focus:outline-none text-lg uppercase" placeholder="例如: S1001 回车" onkeypress="if(event.key==='Enter') window.processScan('student')">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">2. 扫描/输入书本编号 (B开头)</label>
                        <input type="text" id="scan-book-input" class="w-full border-2 border-gray-300 p-3 rounded-lg focus:border-blue-500 focus:outline-none text-lg uppercase" placeholder="例如: B2001 回车" onkeypress="if(event.key==='Enter') window.processScan('book')">
                    </div>
                    <button onclick="window.submitBorrowReturn()" id="btn-submit-action" disabled class="mt-8 w-full py-4 bg-gray-400 text-white rounded-lg font-bold text-xl shadow disabled:opacity-50">等待验证资料...</button>
                </div>

                <!-- 资料展示区 -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col space-y-4">
                    <div class="flex-1 border-2 border-dashed border-gray-200 rounded-lg p-4 flex flex-col justify-center items-center relative">
                        <span class="absolute top-2 left-2 text-xs font-bold text-gray-400">学生信息</span>
                        <div id="display-student" class="text-center text-gray-400">暂无数据</div>
                    </div>
                    <div class="flex-1 border-2 border-dashed border-gray-200 rounded-lg p-4 flex flex-col justify-center items-center relative">
                        <span class="absolute top-2 left-2 text-xs font-bold text-gray-400">书本信息</span>
                        <div id="display-book" class="text-center text-gray-400">暂无数据</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= 模块2：书本管理 ================= -->
        <section id="books" class="hidden max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">书本资料库</h2>
                <button onclick="window.openBookModal()" class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700"><i class="fa-solid fa-plus mr-2"></i>录入新书</button>
            </div>
            <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-sm text-gray-500">封面</th>
                            <th class="p-4 text-sm text-gray-500">编号</th>
                            <th class="p-4 text-sm text-gray-500">书名</th>
                            <th class="p-4 text-sm text-gray-500">作者 / 出版年</th>
                            <th class="p-4 text-sm text-gray-500">状态</th>
                            <th class="p-4 text-sm text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="book-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <!-- ================= 模块3：学生管理 ================= -->
        <section id="students" class="hidden max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">学生与班级管理</h2>
                <button onclick="window.openStudentModal()" class="px-4 py-2 bg-green-600 text-white rounded shadow hover:bg-green-700"><i class="fa-solid fa-user-plus mr-2"></i>添加学生</button>
            </div>
            <!-- 班级筛选 -->
            <div class="mb-4 flex space-x-2">
                <select id="filter-class" class="p-2 border rounded shadow-sm focus:outline-none" onchange="window.loadStudents()">
                    <option value="ALL">全部班级</option>
                    <option value="一年1班">一年1班</option><option value="二年1班">二年1班</option><option value="三年1班">三年1班</option>
                </select>
            </div>
            <div class="bg-white shadow-sm rounded-lg overflow-hidden border border-gray-200">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4 text-sm text-gray-500">学号(扫码编号)</th>
                            <th class="p-4 text-sm text-gray-500">中文名</th>
                            <th class="p-4 text-sm text-gray-500">英文名</th>
                            <th class="p-4 text-sm text-gray-500">班级</th>
                            <th class="p-4 text-sm text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <!-- ================= 模块4：班主任阅读登记 ================= -->
        <section id="reading" class="hidden max-w-5xl mx-auto">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6 border border-gray-200">
                <h2 class="text-2xl font-bold mb-4 border-b pb-2">本月阅读量登记</h2>
                <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm text-gray-500 mb-1">选择班级</label>
                        <select id="reading-class-select" class="w-full p-2 border rounded focus:outline-none">
                            <option value="">-- 请选择班级 --</option>
                            <option value="一年1班">一年1班</option><option value="二年1班">二年1班</option><option value="三年1班">三年1班</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm text-gray-500 mb-1">选择月份</label>
                        <input type="month" id="reading-month-select" class="w-full p-2 border rounded focus:outline-none">
                    </div>
                    <button onclick="window.loadReadingList()" class="px-6 py-2 bg-blue-600 text-white rounded shadow">检索名单</button>
                </div>
            </div>
            
            <div id="reading-list-container" class="hidden bg-white shadow-sm rounded-lg p-6 border border-gray-200">
                <table class="w-full text-left mb-4">
                    <thead>
                        <tr class="bg-gray-100"><th class="p-3">学号</th><th class="p-3">姓名</th><th class="p-3">本月阅读数量 (本)</th></tr>
                    </thead>
                    <tbody id="reading-table-body"></tbody>
                </table>
                <button onclick="window.saveReadingStats()" class="w-full py-3 bg-green-600 text-white font-bold rounded shadow hover:bg-green-700">保存登记数据</button>
            </div>
        </section>
    </main>

    <!-- ================= 弹窗：录入/编辑书本 ================= -->
    <div id="modal-book" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-lg overflow-hidden">
            <div class="bg-blue-600 text-white p-4 flex justify-between">
                <h3 class="font-bold text-lg" id="modal-book-title">录入新书</h3>
                <button onclick="window.closeModal('book')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
                <div class="flex space-x-4 items-center">
                    <div class="w-24 h-32 bg-gray-100 border flex items-center justify-center overflow-hidden">
                        <img id="form-book-cover-img" src="" class="hidden w-full h-full object-cover">
                        <span id="form-book-cover-text" class="text-xs text-gray-400 text-center">无封面<br>(点击上传)</span>
                    </div>
                    <input type="file" id="form-book-file" accept="image/*" class="hidden" onchange="window.handleImageUpload(event)">
                    <button onclick="document.getElementById('form-book-file').click()" class="text-sm bg-gray-200 px-3 py-1 rounded">上传封面照</button>
                </div>
                <input type="hidden" id="form-book-base64">
                
                <div><label class="block text-sm text-gray-600 mb-1">书本编号 (必须唯一)</label><input type="text" id="form-book-id" class="w-full border p-2 rounded uppercase" placeholder="如 B2023"></div>
                <div><label class="block text-sm text-gray-600 mb-1">书本名字</label><input type="text" id="form-book-name" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm text-gray-600 mb-1">作者</label><input type="text" id="form-book-author" class="w-full border p-2 rounded"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm text-gray-600 mb-1">出版年份</label><input type="number" id="form-book-year" class="w-full border p-2 rounded"></div>
                    <div><label class="block text-sm text-gray-600 mb-1">价钱 (元)</label><input type="number" id="form-book-price" class="w-full border p-2 rounded"></div>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end space-x-2">
                <button onclick="window.closeModal('book')" class="px-4 py-2 border rounded bg-white">取消</button>
                <button onclick="window.saveBook()" class="px-4 py-2 bg-blue-600 text-white rounded">保存资料</button>
            </div>
        </div>
    </div>

    <!-- ================= 弹窗：录入/编辑学生 ================= -->
    <div id="modal-student" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-md overflow-hidden">
            <div class="bg-green-600 text-white p-4 flex justify-between">
                <h3 class="font-bold text-lg" id="modal-student-title">添加学生</h3>
                <button onclick="window.closeModal('student')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div><label class="block text-sm text-gray-600 mb-1">学号 / 扫码编号 (必须唯一)</label><input type="text" id="form-std-id" class="w-full border p-2 rounded uppercase" placeholder="如 S1001"></div>
                <div><label class="block text-sm text-gray-600 mb-1">中文姓名</label><input type="text" id="form-std-namecn" class="w-full border p-2 rounded"></div>
                <div><label class="block text-sm text-gray-600 mb-1">英文姓名</label><input type="text" id="form-std-nameen" class="w-full border p-2 rounded"></div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">所属班级</label>
                    <select id="form-std-class" class="w-full border p-2 rounded">
                        <option value="一年1班">一年1班</option><option value="二年1班">二年1班</option><option value="三年1班">三年1班</option>
                    </select>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 flex justify-end space-x-2">
                <button onclick="window.closeModal('student')" class="px-4 py-2 border rounded bg-white">取消</button>
                <button onclick="window.saveStudent()" class="px-4 py-2 bg-green-600 text-white rounded">保存资料</button>
            </div>
        </div>
    </div>

    <!-- 全局提示框 (Toast) -->
    <div id="toast" class="fixed top-4 right-4 bg-gray-800 text-white px-6 py-4 rounded shadow-2xl transform translate-x-[150%] transition-transform duration-300 z-50 font-bold flex items-center">
        <span id="toast-icon" class="mr-3 text-xl"></span><span id="toast-msg"></span>
    </div>

<!-- Firebase SDK 与 业务逻辑 -->
<!-- Firebase SDK 与 业务逻辑 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    // ⚠️ 注意：这里替换为了最新的 initializeFirestore 和 persistentLocalCache 写法，解决黄字警告
    import { 
        initializeFirestore, persistentLocalCache, persistentMultipleTabManager, 
        collection, doc, getDoc, setDoc, deleteDoc,
        getDocs, updateDoc, serverTimestamp, query, where 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA9IFoYJGb6LZJ_CU_C7MXaht6j_lW4xUk",
        authDomain: "library-tl.firebaseapp.com",
        databaseURL: "https://library-tl-default-rtdb.firebaseio.com",
        projectId: "library-tl",
        storageBucket: "library-tl.firebasestorage.app",
        messagingSenderId: "1048466372515",
        appId: "1:1048466372515:web:7a137b44b3fdce83158c16"
    };

    // 初始化 App
    const app = initializeApp(firebaseConfig);
    
    // 🌟 使用 V10 最新写法开启 Firestore 与离线缓存引擎 (彻底消除警告)
    const db = initializeFirestore(app, {
        localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
    });

    // ... (中间的全局变量 currentMode 等保持不变) ...

    // 🌟 升级 loadBooks 函数，增加精确报错与空数据提示
    window.loadBooks = async function() {
        const tbody = document.getElementById('book-table-body');
        tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center text-blue-600 font-bold"><i class="fa-solid fa-spinner fa-spin mr-2"></i>正在连接云端...</td></tr>';
        
        try {
            const snap = await getDocs(collection(db, "books"));
            
            // 如果数据库一本书都没有
            if (snap.empty) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-400">数据库当前为空，请点击右上角【录入新书】</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            snap.forEach(d => {
                const b = { id: d.id, ...d.data() };
                const status = b.status === 'in' ? '<span class="text-green-600 bg-green-100 px-2 py-1 rounded text-xs">在馆</span>' : '<span class="text-red-600 bg-red-100 px-2 py-1 rounded text-xs">借出</span>';
                const img = b.cover ? `<img src="${b.cover}" class="w-10 h-14 object-cover shadow">` : '<div class="w-10 h-14 bg-gray-200 text-[10px] flex items-center justify-center">无图</div>';
                tbody.innerHTML += `<tr class="hover:bg-gray-50">
                    <td class="p-4">${img}</td><td class="p-4 font-mono">${b.id}</td>
                    <td class="p-4 font-bold">《${b.title}》</td><td class="p-4">${b.author} / ${b.year||'-'}</td>
                    <td class="p-4">${status}</td>
                    <td class="p-4"><button onclick="window.deleteDocItem('books', '${b.id}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button></td>
                </tr>`;
            });
        } catch(e) {
            console.error("Firebase读取错误：", e); // 将真实错误打印到控制台
            tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-500 font-bold">读取失败：${e.message}</td></tr>`;
        }
    };

    // 全局状态
    let currentMode = 'borrow'; 
    let sessionStudent = null;
    let sessionBook = null;

    // --- 登录与导航 ---
    window.loginApp = function() {
        if (document.getElementById('admin-pwd').value === 'admin123') {
            document.getElementById('login-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('scan-student-input').focus(); // 自动聚焦扫码枪
            }, 300);
            window.showToast("登录成功", "success");
        } else {
            window.showToast("密码错误", "error");
        }
    }

    window.switchTab = function(tabId) {
        ['borrow', 'books', 'students', 'reading'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
            const nav = document.getElementById('nav-' + id);
            nav.className = "nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-gray-500 hover:bg-gray-50 md:border-l-4 border-transparent";
        });
        document.getElementById(tabId).classList.remove('hidden');
        const activeNav = document.getElementById('nav-' + tabId);
        activeNav.className = "nav-item flex flex-col md:flex-row items-center p-3 md:p-4 text-blue-600 border-t-2 md:border-t-0 md:border-l-4 border-blue-600 bg-blue-50";

        if(tabId === 'books') window.loadBooks();
        if(tabId === 'students') window.loadStudents();
        if(tabId === 'borrow') document.getElementById('scan-student-input').focus();
    }

    window.showToast = function(msg, type = 'info') {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toast-icon');
        document.getElementById('toast-msg').innerText = msg;
        if(type === 'success') { toast.className = "fixed top-4 right-4 bg-green-600 text-white px-6 py-4 rounded shadow-2xl transform transition-transform duration-300 z-50 font-bold flex items-center"; icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>'; }
        else if(type === 'error') { toast.className = "fixed top-4 right-4 bg-red-600 text-white px-6 py-4 rounded shadow-2xl transform transition-transform duration-300 z-50 font-bold flex items-center"; icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>'; }
        toast.classList.remove('translate-x-[150%]');
        setTimeout(() => toast.classList.add('translate-x-[150%]'), 3000);
    }

    // ================== 借还书逻辑 (扫码枪/键盘输入) ==================
    window.setMode = function(mode) {
        currentMode = mode;
        const btnB = document.getElementById('btn-mode-borrow');
        const btnR = document.getElementById('btn-mode-return');
        if (mode === 'borrow') {
            btnB.className = "px-6 py-2 bg-blue-600 text-white rounded-md font-bold shadow";
            btnR.className = "px-6 py-2 text-gray-600 rounded-md font-bold hover:bg-gray-300";
        } else {
            btnR.className = "px-6 py-2 bg-blue-600 text-white rounded-md font-bold shadow";
            btnB.className = "px-6 py-2 text-gray-600 rounded-md font-bold hover:bg-gray-300";
        }
        sessionStudent = null; sessionBook = null;
        updateBorrowUI();
        document.getElementById('scan-student-input').value = '';
        document.getElementById('scan-book-input').value = '';
        document.getElementById(mode === 'borrow' ? 'scan-student-input' : 'scan-book-input').focus();
    }

    window.processScan = async function(type) {
        const inputId = type === 'student' ? 'scan-student-input' : 'scan-book-input';
        const code = document.getElementById(inputId).value.trim().toUpperCase();
        if(!code) return;

        try {
            if (type === 'student') {
                const snap = await getDoc(doc(db, "students", code));
                if(snap.exists()) {
                    sessionStudent = { id: snap.id, ...snap.data() };
                    window.showToast("学生识别成功", "success");
                    document.getElementById('scan-book-input').focus(); // 自动跳到扫书框
                } else { window.showToast("未找到该学号", "error"); sessionStudent = null; }
            } 
            else if (type === 'book') {
                const snap = await getDoc(doc(db, "books", code));
                if(snap.exists()) {
                    sessionBook = { id: snap.id, ...snap.data() };
                    if (currentMode === 'borrow' && sessionBook.status === 'out') {
                        window.showToast("此书已被借出！", "error"); sessionBook = null;
                    } else if (currentMode === 'return' && sessionBook.status === 'in') {
                        window.showToast("此书已在馆，无需归还", "info"); sessionBook = null;
                    } else {
                        window.showToast("书本识别成功", "success");
                    }
                } else { window.showToast("未找到该书本编号", "error"); sessionBook = null; }
            }
        } catch(e) { console.error(e); window.showToast("数据库查询失败", "error"); }
        updateBorrowUI();
    }

    function updateBorrowUI() {
        const stdUI = document.getElementById('display-student');
        const bookUI = document.getElementById('display-book');
        const btn = document.getElementById('btn-submit-action');

        if(sessionStudent) {
            stdUI.innerHTML = `<div class="text-xl font-bold text-blue-600">${sessionStudent.nameCn} <span class="text-sm text-gray-500">(${sessionStudent.nameEn})</span></div><div class="mt-2 text-gray-600">${sessionStudent.className} | 学号: ${sessionStudent.id}</div>`;
        } else { stdUI.innerHTML = '暂无数据'; }

        if(sessionBook) {
            let cover = sessionBook.cover ? `<img src="${sessionBook.cover}" class="h-16 w-12 object-cover mr-4 rounded shadow">` : '';
            bookUI.innerHTML = `<div class="flex items-center">${cover}<div><div class="text-xl font-bold text-blue-600">《${sessionBook.title}》</div><div class="text-sm text-gray-600">编号: ${sessionBook.id} | 作者: ${sessionBook.author}</div></div></div>`;
        } else { bookUI.innerHTML = '暂无数据'; }

        // 按钮校验
        if (currentMode === 'borrow' && sessionStudent && sessionBook) {
            btn.disabled = false; btn.innerText = "确认借阅 (Enter)"; btn.className = "mt-8 w-full py-4 bg-green-600 text-white rounded-lg font-bold text-xl shadow hover:bg-green-700";
        } else if (currentMode === 'return' && sessionBook) {
            btn.disabled = false; btn.innerText = "确认归还 (Enter)"; btn.className = "mt-8 w-full py-4 bg-green-600 text-white rounded-lg font-bold text-xl shadow hover:bg-green-700";
        } else {
            btn.disabled = true; btn.innerText = "等待验证资料..."; btn.className = "mt-8 w-full py-4 bg-gray-400 text-white rounded-lg font-bold text-xl shadow disabled:opacity-50";
        }
    }

    window.submitBorrowReturn = async function() {
        if (document.getElementById('btn-submit-action').disabled) return;
        const newStatus = currentMode === 'borrow' ? 'out' : 'in';
        try {
            await updateDoc(doc(db, "books", sessionBook.id), { status: newStatus });
            await addDoc(collection(db, "borrowLogs"), {
                bookId: sessionBook.id, title: sessionBook.title,
                studentId: sessionStudent ? sessionStudent.id : 'N/A',
                action: currentMode, timestamp: serverTimestamp()
            });
            window.showToast(currentMode === 'borrow' ? "借阅成功！" : "归还成功！", "success");
            // 重置
            document.getElementById('scan-student-input').value = '';
            document.getElementById('scan-book-input').value = '';
            window.setMode(currentMode);
        } catch(e) { window.showToast("操作失败", "error"); }
    }

    // 快捷键: 确认借还
    window.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !document.getElementById('btn-submit-action').disabled && !document.getElementById('modal-book').classList.contains('flex')) {
            // 避免在输入框回车时触发两次
            if(document.activeElement.tagName !== 'INPUT') window.submitBorrowReturn();
        }
    });

    // ================== 书本 CRUD 管理 ==================
    window.loadBooks = async function() {
        const tbody = document.getElementById('book-table-body');
        tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-center">加载中...</td></tr>';
        const snap = await getDocs(collection(db, "books"));
        tbody.innerHTML = '';
        snap.forEach(d => {
            const b = { id: d.id, ...d.data() };
            const status = b.status === 'in' ? '<span class="text-green-600 bg-green-100 px-2 py-1 rounded text-xs">在馆</span>' : '<span class="text-red-600 bg-red-100 px-2 py-1 rounded text-xs">借出</span>';
            const img = b.cover ? `<img src="${b.cover}" class="w-10 h-14 object-cover shadow">` : '<div class="w-10 h-14 bg-gray-200 text-[10px] flex items-center justify-center">无图</div>';
            tbody.innerHTML += `<tr class="hover:bg-gray-50">
                <td class="p-4">${img}</td><td class="p-4 font-mono">${b.id}</td>
                <td class="p-4 font-bold">《${b.title}》</td><td class="p-4">${b.author} / ${b.year||'-'}</td>
                <td class="p-4">${status}</td>
                <td class="p-4"><button onclick="window.deleteDocItem('books', '${b.id}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button></td>
            </tr>`;
        });
    }

    window.openBookModal = function() {
        document.getElementById('form-book-id').value = ''; document.getElementById('form-book-name').value = '';
        document.getElementById('form-book-author').value = ''; document.getElementById('form-book-year').value = '';
        document.getElementById('form-book-price').value = ''; document.getElementById('form-book-base64').value = '';
        document.getElementById('form-book-cover-img').classList.add('hidden'); document.getElementById('form-book-cover-text').classList.remove('hidden');
        document.getElementById('modal-book').classList.remove('hidden'); document.getElementById('modal-book').classList.add('flex');
    }

    // 新增一个全局变量，专门用来存放给 AI 看的高清图
    let ocrHighResBase64 = "";

    // ==== 1. 图片上传处理 (分离：数据库小图 + AI高清图) ====
    window.handleImageUpload = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = e => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                // [给数据库存的缩略图 - 宽300]
                const canvasThumb = document.createElement('canvas'); 
                const ctxThumb = canvasThumb.getContext('2d');
                canvasThumb.width = 300; 
                canvasThumb.height = img.height * (300 / img.width);
                ctxThumb.drawImage(img, 0, 0, canvasThumb.width, canvasThumb.height);
                const thumbB64 = canvasThumb.toDataURL('image/jpeg', 0.6);
                
                // 显示在网页上，并存入隐藏表单准备上传数据库
                document.getElementById('form-book-base64').value = thumbB64;
                document.getElementById('form-book-cover-img').src = thumbB64;
                document.getElementById('form-book-cover-img').classList.remove('hidden');
                document.getElementById('form-book-cover-text').classList.add('hidden');

                // [给 AI 识别用的超高清图 - 宽1200]
                const canvasOCR = document.createElement('canvas'); 
                const ctxOCR = canvasOCR.getContext('2d');
                canvasOCR.width = 1200; 
                canvasOCR.height = img.height * (1200 / img.width);
                ctxOCR.drawImage(img, 0, 0, canvasOCR.width, canvasOCR.height);
                ocrHighResBase64 = canvasOCR.toDataURL('image/jpeg', 0.9); // 存在内存里，不上云端
            }
        }; r.readAsDataURL(file);
    }

    // ==== 2. AI 识别处理 (增加实时进度条) ====
    window.runOCR = async () => {
        if(!ocrHighResBase64) return alert("请先上传照片！");
        
        const btn = document.getElementById('btn-ocr');
        const resultBox = document.getElementById('ocr-result');
        
        btn.disabled = true; // 锁定按钮防止重复点击
        resultBox.value = "⏳ 正在初始化 AI 引擎...\n\n(注意：首次使用需要下载中英文字库，这取决于您的网速，请耐心等待 10 - 30 秒，以后就会很快了！)";

        try {
            // 调用 Tesseract.js，并开启进度监听
            const result = await Tesseract.recognize(ocrHighResBase64, 'eng+msa+chi_sim', {
                logger: m => {
                    console.log(m); // 方便在 F12 控制台排错
                    if (m.status === 'recognizing text') {
                        btn.innerText = `🔍 AI 正在阅读中... ${Math.round(m.progress * 100)}%`;
                    } else if (m.status.includes('loading') || m.status.includes('downloading')) {
                        btn.innerText = `⏳ 正在下载 AI 语言包...`;
                    }
                }
            });
            
            // 提取成功
            resultBox.value = result.data.text;
            window.showToast("🎉 识别完成！请手动复制");
            
        } catch(e) {
            console.error(e);
            resultBox.value = "❌ AI 识别失败，原因：" + e.message;
            window.showToast("识别失败，请检查网络", "error");
        }
        
        // 恢复按钮状态
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 自动提取文字`;
    }

    window.saveBook = async function() {
        const id = document.getElementById('form-book-id').value.trim().toUpperCase();
        const title = document.getElementById('form-book-name').value.trim();
        if(!id || !title) return window.showToast("编号和书名必填", "error");
        
        const data = {
            title: title, author: document.getElementById('form-book-author').value,
            year: document.getElementById('form-book-year').value, price: document.getElementById('form-book-price').value,
            cover: document.getElementById('form-book-base64').value, status: 'in' // 默认在馆
        };
        try {
            await setDoc(doc(db, "books", id), data);
            window.showToast("书籍保存成功", "success");
            window.closeModal('book'); window.loadBooks();
        } catch(e) { window.showToast("保存失败", "error"); }
    }

    // ================== 学生 CRUD 管理 ==================
    window.loadStudents = async function() {
        const filter = document.getElementById('filter-class').value;
        const tbody = document.getElementById('student-table-body');
        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">加载中...</td></tr>';
        
        let q = collection(db, "students");
        if(filter !== 'ALL') q = query(q, where("className", "==", filter));
        const snap = await getDocs(q);
        
        tbody.innerHTML = '';
        snap.forEach(d => {
            const s = { id: d.id, ...d.data() };
            tbody.innerHTML += `<tr class="hover:bg-gray-50">
                <td class="p-4 font-mono font-bold">${s.id}</td><td class="p-4">${s.nameCn}</td>
                <td class="p-4">${s.nameEn||'-'}</td><td class="p-4">${s.className}</td>
                <td class="p-4"><button onclick="window.deleteDocItem('students', '${s.id}')" class="text-red-500 hover:text-red-700"><i class="fa-solid fa-trash"></i></button></td>
            </tr>`;
        });
    }

    window.openStudentModal = function() {
        document.getElementById('form-std-id').value = ''; document.getElementById('form-std-namecn').value = '';
        document.getElementById('form-std-nameen').value = '';
        document.getElementById('modal-student').classList.remove('hidden'); document.getElementById('modal-student').classList.add('flex');
    }

    window.saveStudent = async function() {
        const id = document.getElementById('form-std-id').value.trim().toUpperCase();
        const nameCn = document.getElementById('form-std-namecn').value.trim();
        if(!id || !nameCn) return window.showToast("学号和中文名必填", "error");
        
        const data = {
            nameCn: nameCn, nameEn: document.getElementById('form-std-nameen').value,
            className: document.getElementById('form-std-class').value
        };
        try {
            await setDoc(doc(db, "students", id), data);
            window.showToast("学生保存成功", "success");
            window.closeModal('student'); window.loadStudents();
        } catch(e) { window.showToast("保存失败", "error"); }
    }

    // ================== 班主任阅读量登记 ==================
    let currentReadingStudents = [];
    window.loadReadingList = async function() {
        const className = document.getElementById('reading-class-select').value;
        const month = document.getElementById('reading-month-select').value;
        if(!className || !month) return window.showToast("请先选择班级和月份", "error");

        const tbody = document.getElementById('reading-table-body');
        document.getElementById('reading-list-container').classList.remove('hidden');
        tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center">读取名单中...</td></tr>';

        // 1. 获取该班级所有学生
        const stdSnap = await getDocs(query(collection(db, "students"), where("className", "==", className)));
        currentReadingStudents = [];
        stdSnap.forEach(d => currentReadingStudents.push({ id: d.id, ...d.data() }));

        // 2. 获取该月已存数据
        const docId = `${className}_${month}`; // e.g. "一年1班_2023-10"
        const readSnap = await getDoc(doc(db, "monthlyReads", docId));
        const existData = readSnap.exists() ? readSnap.data().records : {};

        // 3. 渲染表格
        tbody.innerHTML = '';
        currentReadingStudents.forEach(s => {
            const prevCount = existData[s.id] || 0;
            tbody.innerHTML += `<tr class="border-b">
                <td class="p-3 font-mono text-sm">${s.id}</td>
                <td class="p-3">${s.nameCn}</td>
                <td class="p-3"><input type="number" min="0" id="read_cnt_${s.id}" value="${prevCount}" class="border p-2 w-24 text-center rounded focus:border-blue-500"></td>
            </tr>`;
        });
        if(currentReadingStudents.length === 0) tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-red-500">该班级尚未录入任何学生</td></tr>';
    }

    window.saveReadingStats = async function() {
        const className = document.getElementById('reading-class-select').value;
        const month = document.getElementById('reading-month-select').value;
        const docId = `${className}_${month}`;
        
        let records = {};
        currentReadingStudents.forEach(s => {
            const val = document.getElementById(`read_cnt_${s.id}`).value;
            records[s.id] = parseInt(val) || 0;
        });

        try {
            await setDoc(doc(db, "monthlyReads", docId), {
                className: className, month: month, records: records, updatedAt: serverTimestamp()
            });
            window.showToast("✅ 月度阅读数据保存成功", "success");
        } catch (e) { window.showToast("保存失败", "error"); }
    }

    // ================== 通用辅助 ==================
    window.closeModal = function(type) {
        document.getElementById(`modal-${type}`).classList.add('hidden');
        document.getElementById(`modal-${type}`).classList.remove('flex');
    }

    window.deleteDocItem = async function(col, id) {
        if(confirm(`确定要删除 ${id} 的资料吗？此操作不可恢复。`)) {
            await deleteDoc(doc(db, col, id));
            window.showToast("删除成功", "success");
            if(col === 'books') window.loadBooks();
            if(col === 'students') window.loadStudents();
        }
    }

</script>
</body>
</html>
